name: Release

# Every push to main publishes: the version is bumped automatically
# (patch by default; put #minor or #major in the commit message to override)
# and the bump is committed back to main. No manual tagging.
on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false # never cancel a run that may be mid-publish

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  release:
    name: Version, publish, release
    runs-on: ubuntu-latest
    needs: test
    # Skip the bot's own version-bump commit (belt-and-suspenders; pushes made
    # with GITHUB_TOKEN already don't trigger new workflow runs).
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') }}
    permissions:
      contents: write # commit + push the version bump and tag, create the release
      id-token: write # npm provenance
      packages: write # GitHub Packages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the bump commit sits on top of main

      # OIDC trusted publishing needs npm >= 11.5.1. Node 24 bundles a complete
      # npm 11 (with sigstore for provenance); self-upgrading npm 10 -> 11 leaves
      # the tree missing sigstore, so we rely on the bundled npm instead.
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Decide and apply version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(node -p "require('./package.json').version")
          MSG=$(git log -1 --pretty=%B)
          case "$MSG" in
            *'#major'*) LEVEL=major ;;
            *'#minor'*) LEVEL=minor ;;
            *)          LEVEL=patch ;;
          esac
          if npm view "@njtp/soothsay@$CURRENT" version >/dev/null 2>&1; then
            # This version is already on npm -> bump it.
            npm version "$LEVEL" -m "chore(release): %s [skip ci]"
          else
            # First publish of the version already in package.json -> tag as-is.
            npm version "$CURRENT" --allow-same-version -m "chore(release): %s [skip ci]"
          fi
          TAG="v$(node -p "require('./package.json').version")"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (level: $LEVEL)"

      # prepublishOnly (test + build) runs during publish; the test job already gated it.
      # Auth is OIDC trusted publishing (permissions.id-token: write) — no NPM_TOKEN.
      # npm >= 11.5.1 attaches provenance automatically; the --provenance flag is not needed.
      # Requires a Trusted Publisher configured on npmjs.com for this package:
      #   Owner: hybridtechie · Repository: soothsay · Workflow: release.yml
      - name: Publish to npm
        run: npm publish --access public

      - name: Push version bump and tag
        run: git push --follow-tags origin HEAD:main

      # --- GitHub Packages (must be scoped to the repo owner, not the npm org) ---
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://npm.pkg.github.com'
          scope: '@hybridtechie'

      - name: Scope package to the repo owner
        run: npm pkg set name="@hybridtechie/soothsay"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
