name: Release

on:
  push:
    tags:
      - 'v*'

# Minimal at the top; each job widens only what it needs.
permissions:
  contents: read

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      # prepublishOnly (test + build) runs during `npm publish`, and the test
      # job already gated this — no extra build step needed here.
      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      id-token: write # provenance
    steps:
      - uses: actions/checkout@v4

      # GitHub Packages serves scoped names only, so point the @hybridtechie
      # scope at npm.pkg.github.com and auth with the built-in GITHUB_TOKEN.
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@hybridtechie'

      - run: npm ci

      # GitHub Packages requires the name be scoped to the repo owner.
      # The public npm package stays unscoped ("soothsay"); here we publish
      # the same build as "@hybridtechie/soothsay".
      - name: Scope package to the repo owner
        run: npm pkg set name="@hybridtechie/soothsay"

      - name: Publish to GitHub Packages (with provenance)
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-github]
    permissions:
      contents: write # create the GitHub release
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
